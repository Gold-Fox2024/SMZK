<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="1000" height="520" role="img" aria-label="AHP 层次结构示意图">
  <rect x="0" y="0" width="1000" height="520" fill="transparent"/>

  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" text-anchor="middle">
    <g>
      <rect x="420" y="40" width="160" height="80" rx="10" fill="#fbbf24"/>
      <text x="500" y="92" font-size="34" font-weight="800" fill="#0b0f19">目标</text>
    </g>

    <g>
      <rect x="110" y="190" width="170" height="80" rx="10" fill="#f97316"/>
      <rect x="310" y="190" width="170" height="80" rx="10" fill="#f97316"/>
      <rect x="510" y="190" width="170" height="80" rx="10" fill="#f97316"/>
      <rect x="710" y="190" width="170" height="80" rx="10" fill="#f97316"/>

      <text x="195" y="242" font-size="30" font-weight="800" fill="#ffffff">因素A</text>
      <text x="395" y="242" font-size="30" font-weight="800" fill="#ffffff">因素B</text>
      <text x="595" y="242" font-size="30" font-weight="800" fill="#ffffff">因素C</text>
      <text x="795" y="242" font-size="30" font-weight="800" fill="#ffffff">因素D</text>
    </g>

    <g>
      <rect x="300" y="360" width="180" height="90" rx="10" fill="#2563eb"/>
      <rect x="520" y="360" width="180" height="90" rx="10" fill="#2563eb"/>

      <text x="390" y="418" font-size="34" font-weight="800" fill="#ffffff">方案A</text>
      <text x="610" y="418" font-size="34" font-weight="800" fill="#ffffff">方案B</text>
    </g>

    <g stroke="#111827" stroke-width="2" fill="none" stroke-linecap="round">
      <line x1="500" y1="120" x2="195" y2="190"/>
      <line x1="500" y1="120" x2="395" y2="190"/>
      <line x1="500" y1="120" x2="595" y2="190"/>
      <line x1="500" y1="120" x2="795" y2="190"/>

      <line x1="195" y1="270" x2="390" y2="360"/>
      <line x1="395" y1="270" x2="390" y2="360"/>
      <line x1="595" y1="270" x2="390" y2="360"/>
      <line x1="795" y1="270" x2="390" y2="360"/>

      <line x1="195" y1="270" x2="610" y2="360"/>
      <line x1="395" y1="270" x2="610" y2="360"/>
      <line x1="595" y1="270" x2="610" y2="360"/>
      <line x1="795" y1="270" x2="610" y2="360"/>
    </g>

    <g font-size="28" fill="#111827" text-anchor="start">
      <text x="900" y="95" font-weight="800">目标层</text>
      <text x="900" y="245" font-weight="800">准则层</text>
      <text x="900" y="420" font-weight="800">方案层</text>
    </g>
  </g>
</svg>
